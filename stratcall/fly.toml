app = "stratcall-api"
primary_region = "nrt"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  CORS_ORIGIN = "https://stratcall.pages.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
